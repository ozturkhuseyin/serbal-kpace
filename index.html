<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23070b16'/%3E%3Cpath d='M32 8 L40 32 L32 56 L24 32 Z' fill='%23ffb347'/%3E%3Ccircle cx='32' cy='28' r='4' fill='%23070b16'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Serbal Kpace - Browser-based 3D space simulation game" />
    <title>Serbal Kpace — Space Program Simulator</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: #000;
        color: #e8e8e8;
        overflow: hidden;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        user-select: none;
      }
      canvas { display: block; }
      #loader {
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at center, #0a1226 0%, #000 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }
      #loader.hidden { opacity: 0; pointer-events: none; }
      #loader h1 {
        font-size: 48px;
        margin: 0 0 8px;
        letter-spacing: 6px;
        font-weight: 200;
        color: #ffb347;
        text-shadow: 0 0 24px rgba(255, 179, 71, 0.5);
        white-space: nowrap;
      }
      #loader p {
        margin: 0;
        color: #6e7d99;
        letter-spacing: 4px;
        font-size: 12px;
        text-transform: uppercase;
      }
      #loader .ring {
        margin-top: 32px;
        width: 48px;
        height: 48px;
        border: 2px solid rgba(255, 179, 71, 0.2);
        border-top-color: #ffb347;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loader">
      <h1>SERBAL KPACE</h1>
      <p>Initializing flight systems...</p>
      <div class="ring"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
